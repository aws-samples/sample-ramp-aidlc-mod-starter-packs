name: web-app-on-cloudnative
title: Web App on Cloud-Native
description: Multi-tier web application (SPA + BFF + domain engine) on AWS cloud-native compute, built via the AI-DLC decision-driven workflow.

instructions:
  - file: aidlc-workflow.md
    role: primary
  - file: skill-activation.md
    role: companion
    load: always
  - file: reverse-engineering.md
    role: companion
    load: auto
  - file: multi-repo-projects.md
    role: companion
    load: auto

command:
  name: aidlc
  description: Start the AI-DLC decision-gated workflow for this pack

mcp:
  - id: aws-knowledge-mcp-server
    command: npx
    args: ["mcp-remote", "https://knowledge-mcp.global.api.aws"]
    autoApprove:
      - aws___search_documentation
      - aws___read_documentation
      - aws___get_regional_availability
      - aws___list_regions

skills: all
